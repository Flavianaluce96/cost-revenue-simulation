<body class="bg-slate-50 min-h-screen p-2 md:p-4 font-sans flex flex-col">

    <div class="max-w-7xl mx-auto w-full flex flex-col h-full">
        <header class="mb-4 text-center">
            <h1 class="text-2xl font-bold text-slate-800">The "Jeans Factory" Visualizer</h1>
            <p class="text-sm text-slate-600">Adjust the business model and watch the lines react.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 flex-grow">
            
            <!-- LEFT COLUMN: CONTROLS (4/12 width) -->
            <div class="lg:col-span-4 space-y-3 overflow-y-auto pr-1">
                
                <!-- FACTORY A (Sustainable) -->
                <div class="card border-l-4 border-emerald-500">
                    <h2 class="text-md font-bold text-emerald-700 mb-2">Sustainable Factory</h2>
                    <div class="grid grid-cols-1 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">Fixed Cost: ¥<span id="f1-fixed-val">200,000</span></label>
                            <input type="range" id="f1-fixed" min="0" max="400000" step="1000" value="200000" class="slider">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">Cost per Pair: ¥<span id="f1-slope-val">4,000</span></label>
                            <input type="range" id="f1-slope" min="0" max="6000" step="100" value="4000" class="slider">
                        </div>
                    </div>
                </div>

                <!-- FACTORY B (Traditional) -->
                <div class="card border-l-4 border-blue-500">
                    <h2 class="text-md font-bold text-blue-700 mb-2">Traditional Factory</h2>
                    <div class="grid grid-cols-1 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">Fixed Cost: ¥<span id="f2-fixed-val">80,000</span></label>
                            <input type="range" id="f2-fixed" min="0" max="400000" step="1000" value="80000" class="slider">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">Cost per Pair: ¥<span id="f2-slope-val">2,500</span></label>
                            <input type="range" id="f2-slope" min="0" max="6000" step="100" value="2500" class="slider">
                        </div>
                    </div>
                </div>

                <!-- REVENUE -->
                <div class="card border-l-4 border-amber-500">
                    <h2 class="text-md font-bold text-amber-700 mb-2">Selling Price</h2>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Price per Pair: ¥<span id="price-val">6,000</span></label>
                        <input type="range" id="price" min="2000" max="10000" step="500" value="6000" class="slider">
                    </div>
                </div>

            </div>

            

            <!-- RIGHT COLUMN: CHART & INSIGHTS (8/12 width) -->
            <div class="lg:col-span-8 flex flex-col gap-4 min-h-0">
                <div class="card flex-grow flex flex-col min-h-0">
                    <div class="chart-wrapper">
                        <canvas id="businessChart"></canvas>
                    </div>
                    
                    <div id="insights" class="mt-4 p-3 bg-slate-100 rounded-lg text-xs text-slate-700 leading-snug overflow-y-auto min-h-[6rem]">
                        <!-- Dynamic Insights will go here -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const ctx = document.getElementById('businessChart').getContext('2d');
        let chart;

        const inputs = ['f1-fixed', 'f1-slope', 'f2-fixed', 'f2-slope', 'price'];
        
        function updateValues() {
            inputs.forEach(id => {
                document.getElementById(id + '-val').innerText = parseInt(document.getElementById(id).value).toLocaleString();
            });
            drawChart();
        }

        function drawChart() {
            const f1_b = parseInt(document.getElementById('f1-fixed').value);
            const f1_m = parseInt(document.getElementById('f1-slope').value);
            const f2_b = parseInt(document.getElementById('f2-fixed').value);
            const f2_m = parseInt(document.getElementById('f2-slope').value);
            const price = parseInt(document.getElementById('price').value);

            const labels = [];
            const dataF1 = [];
            const dataF2 = [];
            const dataRev = [];

            for (let x = 0; x <= 150; x += 5) {
                labels.push(x);
                dataF1.push(f1_m * x + f1_b);
                dataF2.push(f2_m * x + f2_b);
                dataRev.push(price * x);
            }

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Sustainable Cost', data: dataF1, borderColor: '#10b981', backgroundColor: '#10b981', tension: 0.1, borderWidth: 2, pointRadius: 2 },
                        { label: 'Traditional Cost', data: dataF2, borderColor: '#3b82f6', backgroundColor: '#3b82f6', tension: 0.1, borderWidth: 2, pointRadius: 2 },
                        { label: 'Revenue (Sales)', data: dataRev, borderColor: '#f59e0b', backgroundColor: '#f59e0b', tension: 0.1, borderWidth: 3, pointRadius: 2 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            ticks: { font: { size: 10 }, callback: value => '¥' + value.toLocaleString() }
                        },
                        x: { ticks: { font: { size: 10 } } }
                    },
                    plugins: {
                        legend: { labels: { boxWidth: 12, font: { size: 11 } } }
                    }
                }
            });

            const bep1 = Math.round(f1_b / (price - f1_m));
            const bep2 = Math.round(f2_b / (price - f2_m));

            let insightText = `<strong>Break-Even Points Analysis:</strong> `;
            if (price <= f1_m) {
                insightText += `Sustainable cannot profit (Price ≤ Variable Cost). `;
            } else {
                insightText += `Sustainable BEP: <strong>${bep1}</strong> units. `;
            }
            insightText += `Traditional BEP: <strong>${bep2}</strong> units. `;
            
            if (f1_m < f2_m) {
                insightText += `<br><em>Note: Sustainable is more efficient at high volumes.</em>`;
            }

            document.getElementById('insights').innerHTML = insightText;
        }

        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', updateValues);
        });

        window.onload = updateValues;
    </script>
    <div class="text-beginning text-xs text-slate-500 mt-4">
        Mr. Seif (c)2026
    </div>
</body>
</html>
